# Application
spring.application.name=meli-challenge-api

# H2 Database (in-memory)
spring.datasource.url=jdbc:h2:mem:meli-challenge-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Ejecutar data.sql después de que Hibernate cree el esquema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console (development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true

# Actuator (observabilidad y mantenimiento)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=always
info.app.name=Meli Challenge API
info.app.description=Observabilidad y salud para operación y mantenimiento en el tiempo
info.app.version=1.0

# Exchange Rate API (https://www.exchangerate-api.com)
